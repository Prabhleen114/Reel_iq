version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: insta_ai_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* vars must be passed as build args so Next.js bakes them
        # into the client bundle. The browser uses localhost:8000 (published port).
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_INSTAGRAM_APP_ID: "1763647945017258"
        NEXT_PUBLIC_FRONTEND_URL: http://localhost:3000
    container_name: insta_ai_frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_INSTAGRAM_APP_ID=1763647945017258
      - NEXT_PUBLIC_FRONTEND_URL=http://localhost:3000
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    driver: bridge
